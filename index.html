<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>แปลเกม → ไทย</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f1a;
    --surface: #141624;
    --surface2: #1c1f35;
    --border: #2a2d4a;
    --accent: #7c6af7;
    --accent2: #a78bfa;
    --accent-glow: rgba(124,106,247,0.2);
    --text: #e8e6f0;
    --text-dim: #888aaa;
    --green: #4ade80;
    --yellow: #fbbf24;
    --red: #f87171;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans Thai', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    background: var(--surface);
  }

  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #c084fc);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  header p { font-size: 12px; color: var(--text-dim); margin-top: 1px; }

  .badge {
    margin-left: auto;
    background: var(--accent-glow);
    border: 1px solid var(--accent);
    color: var(--accent2);
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 20px;
    font-weight: 600;
  }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 340px 1fr;
    gap: 0;
    max-height: calc(100vh - 65px);
    overflow: hidden;
  }

  /* LEFT PANEL */
  .left-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .left-panel-scroll {
    flex: 1;
    overflow-y: auto;
  }

  .left-panel-footer {
    border-top: 1px solid var(--border);
    background: var(--surface);
    padding: 12px 0 4px;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    padding: 20px 20px 10px;
  }

  /* Mode tabs */
  .mode-tabs {
    display: flex;
    gap: 6px;
    padding: 0 16px 16px;
  }

  .tab-btn {
    flex: 1;
    padding: 8px 4px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .tab-btn .tab-icon { font-size: 18px; }
  .tab-btn.active {
    background: var(--accent-glow);
    border-color: var(--accent);
    color: var(--accent2);
  }
  .tab-btn:hover:not(.active) { border-color: var(--text-dim); color: var(--text); }

  /* Drop zone */
  .drop-zone {
    margin: 0 16px 16px;
    border: 2px dashed var(--border);
    border-radius: 12px;
    padding: 28px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .drop-zone .drop-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone p { font-size: 13px; color: var(--text-dim); }
  .drop-zone strong { color: var(--accent2); font-size: 12px; }
  #file-input { display: none; }

  /* Text input */
  .text-input-wrap {
    margin: 0 16px 16px;
    display: none;
  }
  .text-input-wrap.show { display: block; }
  .text-input-wrap textarea {
    width: 100%;
    height: 160px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    padding: 12px;
    resize: vertical;
    outline: none;
    line-height: 1.6;
  }
  .text-input-wrap textarea:focus { border-color: var(--accent); }
  .text-input-wrap textarea::placeholder { color: var(--text-dim); }

  /* File list */
  .file-list { padding: 0 16px 8px; }
  .file-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    margin-bottom: 6px;
    font-size: 12px;
  }
  .file-item .file-icon { font-size: 16px; }
  .file-item .file-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .file-item .file-size { color: var(--text-dim); font-size: 10px; }
  .file-item .remove-btn {
    background: none; border: none; color: var(--text-dim);
    cursor: pointer; font-size: 14px; padding: 0 2px;
    line-height: 1;
  }
  .file-item .remove-btn:hover { color: var(--red); }

  /* Options */
  .option-group { padding: 0 16px 16px; }
  .option-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 6px;
  }
  .option-row label { flex: 1; font-size: 12px; color: var(--text-dim); }
  .option-row select, .option-row input[type="checkbox"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'Noto Sans Thai', sans-serif;
    outline: none;
    cursor: pointer;
  }
  .option-row select:focus { border-color: var(--accent); }

  /* Translate btn */
  .translate-btn {
    margin: 8px 16px 20px;
    width: calc(100% - 32px);
    padding: 13px;
    background: linear-gradient(135deg, var(--accent), #9b6bff);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: opacity 0.15s, transform 0.1s;
    box-shadow: 0 4px 20px rgba(124,106,247,0.4);
  }
  .translate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .translate-btn:active { transform: translateY(0); }
  .translate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* RIGHT PANEL */
  .right-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .output-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    flex-shrink: 0;
  }
  .output-header h2 { font-size: 14px; font-weight: 600; }
  .output-header .stats { font-size: 11px; color: var(--text-dim); margin-left: auto; }

  .output-actions { display: flex; gap: 8px; }
  .action-btn {
    padding: 6px 14px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 11px;
    font-family: 'Noto Sans Thai', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
  }
  .action-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .action-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Output area */
  .output-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
  }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    gap: 12px;
  }
  .empty-state .empty-icon { font-size: 48px; opacity: 0.4; }
  .empty-state p { font-size: 13px; text-align: center; line-height: 1.6; }

  /* Progress */
  .progress-bar-wrap {
    margin: 20px 0 8px;
    display: none;
  }
  .progress-bar-wrap.show { display: block; }
  .progress-bar-track {
    height: 4px;
    background: var(--surface2);
    border-radius: 99px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #c084fc);
    border-radius: 99px;
    transition: width 0.3s;
    width: 0%;
  }
  .progress-text { font-size: 11px; color: var(--text-dim); margin-top: 6px; text-align: right; }

  /* Translation result cards */
  .result-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .result-card-header {
    padding: 8px 14px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 10px;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .result-card-header .line-num {
    color: var(--accent2);
    font-weight: 600;
  }
  .result-card-header .speaker {
    background: var(--accent-glow);
    color: var(--accent2);
    padding: 1px 7px;
    border-radius: 4px;
    font-weight: 600;
  }
  .result-card-body {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }
  .result-col {
    padding: 12px 14px;
  }
  .result-col:first-child {
    border-right: 1px solid var(--border);
  }
  .result-col .col-label {
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-weight: 600;
  }
  .result-col .col-text {
    font-size: 13px;
    line-height: 1.6;
    font-family: 'JetBrains Mono', monospace;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .result-col .col-text.thai {
    font-family: 'Noto Sans Thai', sans-serif;
    font-size: 13.5px;
    color: #c4b5fd;
  }

  /* Loading spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .spinner.show { display: inline-block; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Error */
  .error-msg {
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--red);
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
    display: none;
  }
  .error-msg.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="logo">🎮</div>
  <div>
    <h1>Game Translator</h1>
    <p>แปลสคริปต์เกมเป็นภาษาไทยด้วย AI</p>
  </div>
  <span class="badge">✨ Powered by Claude</span>
</header>

<main>
  <!-- LEFT -->
  <div class="left-panel">
  <div class="left-panel-scroll">
    <div class="section-label">ประเภทไฟล์</div>
    <div class="mode-tabs">
      <button class="tab-btn active" onclick="setMode('renpy')" id="tab-renpy">
        <span class="tab-icon">📜</span>
        <span>Ren'Py</span>
        <span style="font-size:9px;opacity:0.6">.rpy</span>
      </button>
      <button class="tab-btn" onclick="setMode('unity')" id="tab-unity">
        <span class="tab-icon">🎮</span>
        <span>Unity</span>
        <span style="font-size:9px;opacity:0.6">.csv/.json</span>
      </button>
      <button class="tab-btn" onclick="setMode('mrpg')" id="tab-mrpg">
        <span class="tab-icon">⚔️</span>
        <span>MRPG</span>
        <span style="font-size:9px;opacity:0.6">JSON/CSV</span>
      </button>
      <button class="tab-btn" onclick="setMode('text')" id="tab-text">
        <span class="tab-icon">📝</span>
        <span>ข้อความ</span>
        <span style="font-size:9px;opacity:0.6">วางข้อความ</span>
      </button>
    </div>

    <!-- Drop zone (file mode) -->
    <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()"
         ondragover="handleDragOver(event)" ondragleave="handleDragLeave(event)" ondrop="handleDrop(event)">
      <div class="drop-icon">📂</div>
      <p>ลากไฟล์มาวางที่นี่<br>หรือคลิกเพื่อเลือกไฟล์</p>
      <br>
      <strong id="file-accept-hint">.rpy, .rpyc, .txt</strong>
    </div>
    <input type="file" id="file-input" multiple onchange="handleFileSelect(event)">

    <!-- Text input (text mode) -->
    <div class="text-input-wrap" id="text-input-wrap">
      <textarea id="text-paste" placeholder="วางข้อความจากเกมที่นี่...&#10;&#10;ตัวอย่าง:&#10;label start:&#10;    e &quot;Hello! Nice to meet you.&quot;&#10;    &quot;The sky was bright and clear.&quot;"></textarea>
    </div>

    <!-- File list -->
    <div class="file-list" id="file-list"></div>

    <div class="section-label">ตัวเลือก</div>
    <div class="option-group">
      <div class="option-row">
        <label>สไตล์การแปล</label>
        <select id="style-select">
          <option value="natural">เป็นธรรมชาติ</option>
          <option value="formal">ทางการ</option>
          <option value="casual">สบายๆ</option>
          <option value="manga">สไตล์มังงะ</option>
        </select>
      </div>
      <div class="option-row">
        <label>เก็บ format โค้ด</label>
        <input type="checkbox" id="keep-format" checked>
      </div>
      <div class="option-row">
        <label>แปลชื่อตัวละคร</label>
        <input type="checkbox" id="translate-names">
      </div>
    </div>

    </div><!-- end left-panel-scroll -->
  </div>

  <!-- RIGHT -->
  <div class="right-panel">
    <div class="output-header">
      <h2>ผลการแปล</h2>
      <span class="stats" id="stats-text"></span>
      <div class="output-actions">
        <button class="translate-btn" id="translate-btn" onclick="startTranslation()">
          <div class="spinner" id="spinner"></div>
          <span id="btn-text">🌏 แปลเป็นภาษาไทย</span>
        </button>
        <button class="action-btn" id="copy-btn" onclick="copyResult()" disabled>📋 คัดลอกทั้งหมด</button>
        <button class="action-btn" id="download-btn" onclick="downloadResult()" disabled>⬇️ ดาวน์โหลด</button>
      </div>
    </div>
    <div class="output-body" id="output-body">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🌐</div>
        <p>เลือกไฟล์หรือวางข้อความ<br>แล้วกด "แปลเป็นภาษาไทย"</p>
      </div>
      <div class="error-msg" id="error-msg"></div>
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">กำลังแปล...</div>
      </div>
      <div id="results-container"></div>
    </div>
  </div>
</main>

<script>
let currentMode = 'renpy';
let uploadedFiles = [];
let translationResults = [];
let fullTranslatedText = '';

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + mode).classList.add('active');

  const dropZone = document.getElementById('drop-zone');
  const textWrap = document.getElementById('text-input-wrap');
  const hint = document.getElementById('file-accept-hint');
  const fileInput = document.getElementById('file-input');

  if (mode === 'text') {
    dropZone.style.display = 'none';
    textWrap.classList.add('show');
  } else {
    dropZone.style.display = '';
    textWrap.classList.remove('show');
    if (mode === 'renpy') {
      hint.textContent = '.rpy, .rpyc, .txt';
      fileInput.accept = '.rpy,.rpyc,.txt';
    } else if (mode === 'unity') {
      hint.textContent = '.csv, .json (Unity Localization)';
      fileInput.accept = '.csv,.json';
    } else {
      hint.textContent = '.json, .csv, .txt';
      fileInput.accept = '.json,.csv,.txt';
    }
  }
}

function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.add('dragover');
}
function handleDragLeave() {
  document.getElementById('drop-zone').classList.remove('dragover');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('drop-zone').classList.remove('dragover');
  const files = Array.from(e.dataTransfer.files);
  addFiles(files);
}
function handleFileSelect(e) {
  addFiles(Array.from(e.target.files));
}
function addFiles(files) {
  files.forEach(f => {
    if (!uploadedFiles.find(x => x.name === f.name)) uploadedFiles.push(f);
  });
  renderFileList();
}
function removeFile(name) {
  uploadedFiles = uploadedFiles.filter(f => f.name !== name);
  renderFileList();
}
function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  uploadedFiles.forEach(f => {
    const icon = f.name.endsWith('.json') ? '📋' : f.name.endsWith('.csv') ? '📊' : '📜';
    const size = f.size > 1024 ? (f.size / 1024).toFixed(1) + ' KB' : f.size + ' B';
    list.innerHTML += `
      <div class="file-item">
        <span class="file-icon">${icon}</span>
        <span class="file-name">${f.name}</span>
        <span class="file-size">${size}</span>
        <button class="remove-btn" onclick="removeFile('${f.name}')">✕</button>
      </div>`;
  });
}

// Parse Ren'Py script
function parseRenPy(text) {
  const lines = text.split('\n');
  const segments = [];
  lines.forEach((line, i) => {
    const trimmed = line.trim();
    // dialogue: name "text" or just "text"
    const dialogueMatch = trimmed.match(/^(\w+)\s+"(.+)"$/) || trimmed.match(/^"(.+)"$/);
    if (dialogueMatch) {
      if (dialogueMatch[2]) {
        segments.push({ lineNum: i + 1, speaker: dialogueMatch[1], text: dialogueMatch[2], raw: line });
      } else {
        segments.push({ lineNum: i + 1, speaker: null, text: dialogueMatch[1], raw: line });
      }
    }
  });
  return segments;
}

// Parse Unity Localization CSV
// Format: Key,English,Thai(or empty)  OR  Key,Source,Translation
function parseUnityCSV(text) {
  const lines = text.split('\n');
  if (lines.length === 0) return [];
  const segments = [];
  // detect header
  const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
  const keyIdx = header.findIndex(h => h === 'key' || h === 'id' || h === 'name');
  // find english/source column
  const srcIdx = header.findIndex(h => h.includes('english') || h.includes('source') || h.includes('en') || h === 'value');
  const useKeyIdx = keyIdx >= 0 ? keyIdx : 0;
  const useSrcIdx = srcIdx >= 0 ? srcIdx : (useKeyIdx === 0 ? 1 : 0);

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    // simple CSV split (handles basic quoted fields)
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g)
      .map(c => c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
    const key = cols[useKeyIdx] || '';
    const src = cols[useSrcIdx] || '';
    if (src && src.length > 1 && !/^[0-9]+$/.test(src)) {
      segments.push({ lineNum: key || i, speaker: key || null, text: src, raw: line, colIndex: useSrcIdx, cols });
    }
  }
  return segments;
}

// Parse Unity Localization JSON
// Handles: {"entries":[{"key":"..","value":".."}]} or flat {"key":"value"}
function parseUnityJSON(text) {
  try {
    const data = JSON.parse(text);
    const segments = [];
    // try entries array (Unity Localization package format)
    const entries = data.entries || data.m_Entries || data.keys || null;
    if (Array.isArray(entries)) {
      entries.forEach((e, i) => {
        const key = e.key || e.m_Key || e.id || i;
        const val = e.value || e.m_LocalizedValue || e.source || e.english || '';
        if (val && val.length > 1) segments.push({ lineNum: key, speaker: String(key), text: val, raw: JSON.stringify(e) });
      });
    } else {
      // flat object
      const walk = (obj, path) => {
        if (typeof obj === 'string' && obj.length > 2 && !/^[0-9a-f-]{8,}$/.test(obj)) {
          segments.push({ lineNum: path, speaker: path.split('.').pop(), text: obj, raw: obj });
        } else if (typeof obj === 'object' && obj !== null && !Array.isArray(obj)) {
          Object.entries(obj).forEach(([k, v]) => walk(v, path ? path + '.' + k : k));
        }
      };
      walk(data, '');
    }
    return segments.slice(0, 50);
  } catch {
    return parseTextLines(text);
  }
}

// Rebuild Unity CSV with translations inserted
function rebuildUnityCSV(originalText, toTranslate, translations, thaiColHeader) {
  const lines = originalText.split('\n');
  const header = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, '').toLowerCase());
  // find or append thai column
  let thaiIdx = header.findIndex(h => h.includes('thai') || h.includes('th') || h === 'translation');

  const outputLines = [lines[0] + (thaiIdx < 0 ? ',Thai' : '')];
  thaiIdx = thaiIdx >= 0 ? thaiIdx : header.length;

  // map key -> thai
  const thaiMap = {};
  toTranslate.forEach((seg, i) => { thaiMap[String(seg.lineNum)] = translations[i]?.thai || ''; });

  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) { outputLines.push(''); continue; }
    const cols = line.match(/("(?:[^"]|"")*"|[^,]*)/g)
      .map(c => c.trim().replace(/^"|"$/g, '').replace(/""/g, '"'));
    const key = cols[toTranslate[0]?.cols ? 0 : 0] || '';
    const thai = thaiMap[key] || thaiMap[String(i)] || '';
    if (thaiIdx >= cols.length) cols.push(thai);
    else cols[thaiIdx] = thai;
    outputLines.push(cols.map(c => c.includes(',') || c.includes('"') ? `"${c.replace(/"/g,'""')}"` : c).join(','));
  }
  return outputLines.join('\n');
}
function parseMRPG(text) {
  try {
    const data = JSON.parse(text);
    const segments = [];
    const walk = (obj, path = '') => {
      if (typeof obj === 'string' && obj.length > 3) {
        segments.push({ lineNum: path, speaker: null, text: obj, raw: obj });
      } else if (Array.isArray(obj)) {
        obj.forEach((v, i) => walk(v, path + '[' + i + ']'));
      } else if (typeof obj === 'object' && obj !== null) {
        Object.entries(obj).forEach(([k, v]) => walk(v, path ? path + '.' + k : k));
      }
    };
    walk(data);
    return segments.slice(0, 60); // limit
  } catch {
    return parseTextLines(text);
  }
}

// Parse plain text
function parseTextLines(text) {
  return text.split('\n')
    .map((line, i) => ({ lineNum: i + 1, speaker: null, text: line.trim(), raw: line }))
    .filter(s => s.text.length > 2);
}

async function startTranslation() {
  const btn = document.getElementById('translate-btn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btn-text');
  const errorMsg = document.getElementById('error-msg');
  const emptyState = document.getElementById('empty-state');
  const resultsContainer = document.getElementById('results-container');
  const progressWrap = document.getElementById('progress-wrap');
  const progressFill = document.getElementById('progress-fill');
  const progressText = document.getElementById('progress-text');

  errorMsg.classList.remove('show');

  let segments = [];

  if (currentMode === 'text') {
    const txt = document.getElementById('text-paste').value.trim();
    if (!txt) { showError('กรุณาวางข้อความก่อนแปล'); return; }
    segments = parseTextLines(txt);
  } else if (uploadedFiles.length === 0) {
    showError('กรุณาเลือกไฟล์ก่อนแปล'); return;
  } else {
    const file = uploadedFiles[0];
    const text = await file.text();
    if (currentMode === 'renpy') segments = parseRenPy(text);
    else segments = parseMRPG(text);
  }

  if (segments.length === 0) { showError('ไม่พบข้อความที่แปลได้ในไฟล์นี้'); return; }

  // Limit to 30 segments per call
  const toTranslate = segments.slice(0, 30);

  btn.disabled = true;
  spinner.classList.add('show');
  btnText.textContent = 'กำลังแปล...';
  emptyState.style.display = 'none';
  resultsContainer.innerHTML = '';
  progressWrap.classList.add('show');
  progressFill.style.width = '10%';
  progressText.textContent = `กำลังส่ง ${toTranslate.length} ประโยคให้ AI แปล...`;

  const style = document.getElementById('style-select').value;
  const keepFormat = document.getElementById('keep-format').checked;
  const translateNames = document.getElementById('translate-names').checked;

  const styleMap = {
    natural: 'เป็นธรรมชาติ สละสลวย อ่านง่าย',
    formal: 'ทางการ สุภาพ เป็นทางการ',
    casual: 'สบายๆ ไม่เป็นทางการ ใช้ภาษาพูด',
    manga: 'สไตล์มังงะ/อนิเมะ ใช้คำเรียกแทนตัวเองเช่น ข้า, ข้าพเจ้า, กู, เรา ตามบริบท'
  };

  const prompt = `คุณเป็นนักแปลเกมมืออาชีพ แปลข้อความจากเกมเป็นภาษาไทย สไตล์: ${styleMap[style]}
${keepFormat ? 'คงรูปแบบโค้ดและ tag ต่างๆไว้' : ''}
${translateNames ? 'แปลชื่อตัวละครเป็นภาษาไทยถ้าแปลได้' : 'คงชื่อตัวละครไว้เป็นภาษาอังกฤษ'}

แปลข้อความต่อไปนี้เป็นภาษาไทย ตอบเป็น JSON array เท่านั้น ไม่มีข้อความอื่น:
[
  {"original": "ข้อความต้นฉบับ", "thai": "คำแปลภาษาไทย"},
  ...
]

ข้อความที่ต้องแปล:
${toTranslate.map((s, i) => `${i + 1}. ${s.text}`).join('\n')}`;

  try {
    progressFill.style.width = '40%';
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 4000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    progressFill.style.width = '80%';
    const data = await response.json();
    const rawText = data.content.map(c => c.text || '').join('');

    // Parse JSON from response
    let translations = [];
    try {
      const jsonMatch = rawText.match(/\[[\s\S]*\]/);
      if (jsonMatch) translations = JSON.parse(jsonMatch[0]);
    } catch {
      translations = toTranslate.map((s, i) => ({ original: s.text, thai: rawText.split('\n')[i] || s.text }));
    }

    progressFill.style.width = '100%';
    progressText.textContent = `แปลเสร็จแล้ว ${translations.length} ประโยค`;

    // Render results
    translationResults = translations;
    fullTranslatedText = '';
    toTranslate.forEach((seg, i) => {
      const thai = translations[i]?.thai || '';
      fullTranslatedText += generateOutputLine(seg, thai) + '\n';
      resultsContainer.innerHTML += renderCard(seg, thai, i);
    });

    document.getElementById('stats-text').textContent = `${translations.length} ประโยค`;
    document.getElementById('copy-btn').disabled = false;
    document.getElementById('download-btn').disabled = false;

  } catch (err) {
    showError('เกิดข้อผิดพลาด: ' + err.message);
    progressWrap.classList.remove('show');
  }

  btn.disabled = false;
  spinner.classList.remove('show');
  btnText.textContent = '🌏 แปลเป็นภาษาไทย';
}

function generateOutputLine(seg, thai) {
  if (currentMode === 'renpy') {
    if (seg.speaker) return `    ${seg.speaker} "${thai}"`;
    return `    "${thai}"`;
  }
  return thai;
}

function renderCard(seg, thai, i) {
  const speakerTag = seg.speaker ? `<span class="speaker">${seg.speaker}</span>` : '';
  const lineLabel = seg.lineNum ? `<span class="line-num">บรรทัด ${seg.lineNum}</span>` : `<span class="line-num">#${i+1}</span>`;
  return `
    <div class="result-card">
      <div class="result-card-header">
        ${lineLabel}
        ${speakerTag}
      </div>
      <div class="result-card-body">
        <div class="result-col">
          <div class="col-label">ต้นฉบับ</div>
          <div class="col-text">${escHtml(seg.text)}</div>
        </div>
        <div class="result-col">
          <div class="col-label">ภาษาไทย</div>
          <div class="col-text thai">${escHtml(thai)}</div>
        </div>
      </div>
    </div>`;
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('show');
  document.getElementById('empty-state').style.display = 'none';
}

function copyResult() {
  navigator.clipboard.writeText(fullTranslatedText).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = '✅ คัดลอกแล้ว';
    setTimeout(() => btn.textContent = '📋 คัดลอกทั้งหมด', 2000);
  });
}

function downloadResult() {
  const ext = currentMode === 'renpy' ? '.rpy' : currentMode === 'mrpg' ? '_thai.txt' : '_thai.txt';
  const filename = (uploadedFiles[0]?.name?.replace(/\.[^.]+$/, '') || 'translation') + ext;
  const blob = new Blob([fullTranslatedText], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}
